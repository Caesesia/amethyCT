- name: Install required dependencies
  hosts: town-hall
  become: true
  gather_facts: false

  tasks:
    - name: Install basic dependencies
      ansible.builtin.apt:
        pkg:
          - ca-certificates
          - curl
          - git
          - micro

    - name: Config keyring
      ansible.builtin.command: "isntall -m 0755 /etc/apt/keyrings"

