---
- name: Basic instance setup
  hosts: town-hall
  become: true
  gather_facts: false

  tasks:
    - name: Update local package index
      ansible.builtin.command: "apt update"

    - name: Upgrade packages
      ansible.builtin.command: "apt upgrade -y"

    - name: Install packages
      ansible.builtin.apt:
        pkg:
          - vim

